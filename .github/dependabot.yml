version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 2

  - package-ecosystem: cargo
    directory: /backend
    schedule:
      interval: daily
    cooldown:
      default-days: 2

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: daily
    cooldown:
      default-days: 2
    groups:
      rs-pack:
        patterns:
          - "@rspack/*"
          - "@rsbuild/*"

  - package-ecosystem: npm
    directory: /e2e
    schedule:
      interval: daily
    cooldown:
      default-days: 2
      
